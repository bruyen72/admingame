<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quiron Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .login-card { background: white; padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; color: #1e293b; }
        .logo-icon { background: #f1f5f9; width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px; }
        h1 { font-size: 24px; margin-bottom: 8px; font-weight: 800; }
        p { color: #64748b; font-size: 14px; margin-bottom: 30px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 700; color: #475569; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; transition: 0.2s; outline: none; }
        input:focus { border-color: #3b82f6; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(37, 99, 235, 0.3); }
        .error { background: #fee2e2; color: #dc2626; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; display: none; }

        @media (max-width: 480px) {
            body { padding: 16px; align-items: flex-start; padding-top: 40px; }
            .login-card { padding: 28px 20px; border-radius: 18px; }
            .logo-icon { width: 64px; height: 64px; font-size: 32px; border-radius: 16px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon">🏛️</div>
        <h1>Painel Admin</h1>
        <p>Acesse a gestão do Quiron Concursos</p>
        <div id="errorMsg" class="error">Código incorreto!</div>
        <div class="input-group">
            <label>Código de Desenvolvedor</label>
            <input type="password" id="adminCode" placeholder="••••••••">
        </div>
        <button class="btn" onclick="tryLogin()">🔓 ACESSAR PAINEL</button>
        <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid #f1f5f9;">
            <p style="margin-bottom: 0; font-size: 11px;">Área restrita a desenvolvedores autorizados.</p>
        </div>
    </div>
    <script>
        function tryLogin() {
            const code = document.getElementById('adminCode').value;
            if (code === 'QUIRON_DEV_2024') {
                localStorage.setItem('quiron_admin_logged', 'true');
                window.location.href = 'dashboard.html';
            } else {
                const err = document.getElementById('errorMsg');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 3000);
            }
        }
        if (localStorage.getItem('quiron_admin_logged') === 'true') { window.location.href = 'dashboard.html'; }
    </script>
</body>
</html>
